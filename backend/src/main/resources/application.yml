spring:
  application:
    name: lazyapp

  datasource:
    url: jdbc:postgresql://localhost:5432/lazyapp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080

# AI Service Configuration - Google Gemini
ai:
  api-key: ${AI_API_KEY:your-api-key-here}
  base-url: ${AI_BASE_URL:https://generativelanguage.googleapis.com}
  model: ${AI_MODEL:gemini-2.5-flash}
